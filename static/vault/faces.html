<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Events - Rostos</title>
    <link rel="stylesheet" href="css/events.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h2><i class="fas fa-shield-halved"></i> Secure</h2>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fas fa-chart-line"></i><span>Dashboard</span></a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html?tab=events"><i class="fas fa-calendar-event"></i><span>Eventos</span></a></li>
                <li class="nav-item"><a class="nav-link active" href="faces.html"><i class="fas fa-user-circle"></i><span>Rostos</span></a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html?tab=totems"><i class="fas fa-desktop"></i><span>Totens</span></a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html?tab=logs"><i class="fas fa-list-alt"></i><span>Logs</span></a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html?tab=settings"><i class="fas fa-cog"></i><span>Configurações</span></a></li>
            </ul>
            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <a class="nav-link" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
            </div>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>Gestão de Rostos</h1>
                <div class="user-info"><span id="user-name">Carregando...</span><div class="user-avatar"><i class="fas fa-user"></i></div></div>
            </header>
            <div class="card">
                <div class="card-header"><h3>Rostos Cadastrados</h3></div>
                <div class="filter-bar">
                    <select id="face-event-filter"><option value="">Selecione um evento</option></select>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Ticket ID</th><th>Status</th><th>Cadastrado em</th><th>Ações</th></tr></thead>
                        <tbody id="faces-table"><tr><td colspan="4" class="text-center">Selecione um evento</td></tr></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script>
        requireAuth();
        const user = auth.getUser();
        if (user) document.getElementById('user-name').textContent = user.name;
        
        (async () => {
            const events = await eventsApi.list();
            document.getElementById('face-event-filter').innerHTML = 
                '<option value="">Selecione um evento</option>' + 
                events.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
        })();
        
        document.getElementById('face-event-filter').addEventListener('change', async (e) => {
            if (!e.target.value) return;
            const faces = await facesApi.list(e.target.value);
            document.getElementById('faces-table').innerHTML = faces.length ? 
                faces.map(f => `<tr><td><code>${f.ticket_id}</code></td><td><span class="badge badge-${f.status === 'active' ? 'success' : 'error'}">${f.status}</span></td><td>${formatDate(f.captured_at)}</td><td><button class="btn-icon" onclick="deleteFace('${f.event_id}', '${f.ticket_id}')"><i class="fas fa-trash"></i></button></td></tr>`).join('') :
                '<tr><td colspan="4" class="text-center">Nenhum rosto</td></tr>';
        });
    </script>
</body>
</html>
