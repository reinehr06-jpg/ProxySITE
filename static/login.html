<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Basileia Proxy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c16;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
        }
        .login-card {
            background: #161625;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin-bottom: 10px; font-size: 2rem; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .input-group input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0c0c16;
            color: #fff;
            font-size: 1rem;
        }
        .input-group input:focus { outline: none; border-color: #8a2be2; }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: #8a2be2;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background: #7b25d1; }
        .error-msg {
            color: #ef4444;
            margin-top: 15px;
            display: none;
            padding: 10px;
            background: rgba(239,68,68,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Basileia Proxy</h1>
        <p>Faça login para continuar</p>
        
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn-login" onclick="fazerLogin()">Entrar no Painel</button>
        
        <div id="error-msg" class="error-msg"></div>
    </div>

    <script>
        function fazerLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');
            
            if (user === 'admin' && pass === 'admin') {
                localStorage.setItem('isAuthenticated', 'true');
                window.location.href = '/dashboard';
            } else {
                error.style.display = 'block';
                error.innerText = 'Usuário ou senha incorretos';
            }
        }
    </script>
</body>
</html>
